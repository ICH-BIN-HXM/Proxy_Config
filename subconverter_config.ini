[custom]

; ============================================================
; BASE CONFIGURATION FILE
; Path is relative to the subconverter working directory (/base).
; ============================================================
clash_rule_base=base/base.yaml


; ============================================================
; PROXY GROUP SYNTAX
;
; custom_proxy_group=<GroupName>`<type>`<filter>`<url>`<interval>[,<timeout>[,<tolerance>]]
;
; type:
;   url-test  — automatically selects the fastest node by latency
;   fallback  — uses the first available node in order
;   select    — manual selection
;   relay     — chains proxies sequentially: node1 -> node2 -> ... -> Internet
;
; filter (for url-test / fallback / select):
;   !!GROUPID=N  — match nodes from the Nth subscription URL (0-indexed)
;   (regex)      — match nodes whose name contains this pattern
;   []GroupName  — reference an existing proxy-group by name
;   []DIRECT     — reference the built-in DIRECT policy
;   Multiple filters on the same line are ANDed (intersection).
;
; url:       health-check URL used for latency testing
; interval:  health-check interval in seconds
; timeout:   (optional) timeout per check in seconds
; tolerance: (optional) re-select threshold in milliseconds
; ============================================================


; ============================================================
; SUBSCRIPTION SOURCES
;
; The order of subscription URLs in the request determines GROUPID:
;   GROUPID=0 -> FlowerCloud  (first URL)
;   GROUPID=1 -> LiangXinYun (second URL)
;
; Request format:
;   /sub?target=clash&url=<URL0>|<URL1>&config=...
; ============================================================


; ============================================================
; PER-REGION URL-TEST GROUPS
;
; Each group collects nodes from one subscription (!!GROUPID=N)
; whose name matches the Chinese region keyword.
; url-test benchmarks all matched nodes and keeps the fastest active.
;
; Syntax breakdown:
;   GroupName  `url-test` !!GROUPID=N `(keyword)` <test-url> `interval,timeout,tolerance
;   ^name       ^type      ^sub filter  ^regex       ^test URL   ^timing params
; ============================================================

; -- FlowerCloud (GROUPID=0) --
custom_proxy_group=FlowerCloud | HK`url-test`!!GROUPID=0`(香港)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | JP`url-test`!!GROUPID=0`(日本)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | KR`url-test`!!GROUPID=0`(韩国)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | DE`url-test`!!GROUPID=0`(德国)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | UK`url-test`!!GROUPID=0`(英国)`http://www.gstatic.com/generate_204`300,5,50

; -- LiangXinYun (GROUPID=1) --
custom_proxy_group=LiangXinYun | HK`url-test`!!GROUPID=1`(香港)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=LiangXinYun | JP`url-test`!!GROUPID=1`(日本)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=LiangXinYun | KR`url-test`!!GROUPID=1`(韩国)`http://www.gstatic.com/generate_204`300,5,50


; ============================================================
; PER-REGION FALLBACK GROUPS
;
; fallback tests nodes in order and switches to the next only when
; the current node fails the health-check.
; []GroupName references an existing proxy-group as a single entry.
; Single-member fallback groups are valid and extensible later.
;
; interval: health-check interval in seconds
; ============================================================
custom_proxy_group=HK`fallback`[]FlowerCloud | HK`[]LiangXinYun | HK`http://www.gstatic.com/generate_204`60
custom_proxy_group=JP`fallback`[]FlowerCloud | JP`[]LiangXinYun | JP`http://www.gstatic.com/generate_204`60
custom_proxy_group=KR`fallback`[]FlowerCloud | KR`[]LiangXinYun | KR`http://www.gstatic.com/generate_204`60
custom_proxy_group=DE`fallback`[]FlowerCloud | DE`http://www.gstatic.com/generate_204`60
custom_proxy_group=UK`fallback`[]FlowerCloud | UK`http://www.gstatic.com/generate_204`60


; ============================================================
; RELAY GROUPS
;
; relay chains proxies in the exact listed order.
; Traffic flow: Clash -> node1 -> node2 -> Internet
; []GroupName inside relay resolves to the group's currently active node.
; ============================================================
custom_proxy_group=HK-Exit`relay`[]HK`[]Exit
custom_proxy_group=JP-Exit`relay`[]JP`[]Exit
custom_proxy_group=KR-Exit`relay`[]KR`[]Exit
custom_proxy_group=DE-Exit`relay`[]DE`[]Exit
custom_proxy_group=UK-Exit`relay`[]UK`[]Exit


; ============================================================
; TOP-LEVEL SELECTOR
;
; select requires manual choice in the dashboard.
; All relay groups are listed as options, plus DIRECT as bypass.
; Routing rules point to this group via policy name "Proxy".
; ============================================================
custom_proxy_group=Proxy`select`[]HK-Exit`[]JP-Exit`[]KR-Exit`[]DE-Exit`[]UK-Exit`[]DIRECT


; ============================================================
; RULE GENERATION
;
; Disabled because all rules and rule-providers are defined
; directly in the base YAML (mybase.yaml).
; overwrite_original_rules=false preserves the base file rules.
; ============================================================
enable_rule_generator=false
overwrite_original_rules=false
