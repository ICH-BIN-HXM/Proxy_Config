[custom]

; ============================================================
; BASE CONFIGURATION FILE
; Path is relative to the subconverter working directory (/base).
; ============================================================
clash_rule_base=base/base.yaml


; ============================================================
; PROXY GROUP SYNTAX
;
; !!GROUP=tagname matches nodes from the subscription tagged with that name.
; Tag is assigned in the request URL using: tag:tagname,<encoded_url>
; ============================================================

; -- FlowerCloud (tag: FC) --
custom_proxy_group=FlowerCloud | HK`url-test`!!GROUP=FC`(香港)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | JP`url-test`!!GROUP=FC`(日本)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | KR`url-test`!!GROUP=FC`(韩国)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | DE`url-test`!!GROUP=FC`(德国)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=FlowerCloud | UK`url-test`!!GROUP=FC`(英国)`http://www.gstatic.com/generate_204`300,5,50

; -- LiangXinYun (tag: LXY) --
custom_proxy_group=LiangXinYun | HK`url-test`!!GROUP=LXY`(香港)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=LiangXinYun | JP`url-test`!!GROUP=LXY`(日本)`http://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=LiangXinYun | KR`url-test`!!GROUP=LXY`(韩国)`http://www.gstatic.com/generate_204`300,5,50


; ============================================================
; PER-REGION FALLBACK GROUPS
;
; fallback tests nodes in order and switches to the next only when
; the current node fails the health-check.
; []GroupName references an existing proxy-group as a single entry.
; Single-member fallback groups are valid and extensible later.
;
; interval: health-check interval in seconds
; ============================================================
custom_proxy_group=HK`fallback`[]FlowerCloud | HK`[]LiangXinYun | HK`http://www.gstatic.com/generate_204`60
custom_proxy_group=JP`fallback`[]FlowerCloud | JP`[]LiangXinYun | JP`http://www.gstatic.com/generate_204`60
custom_proxy_group=KR`fallback`[]FlowerCloud | KR`[]LiangXinYun | KR`http://www.gstatic.com/generate_204`60
custom_proxy_group=DE`fallback`[]FlowerCloud | DE`http://www.gstatic.com/generate_204`60
custom_proxy_group=UK`fallback`[]FlowerCloud | UK`http://www.gstatic.com/generate_204`60


; ============================================================
; RELAY GROUPS
;
; relay chains proxies in the exact listed order.
; Traffic flow: Clash -> node1 -> node2 -> Internet
; []GroupName inside relay resolves to the group's currently active node.
; ============================================================
custom_proxy_group=HK-Exit`relay`[]HK`[]Exit
custom_proxy_group=JP-Exit`relay`[]JP`[]Exit
custom_proxy_group=KR-Exit`relay`[]KR`[]Exit
custom_proxy_group=DE-Exit`relay`[]DE`[]Exit
custom_proxy_group=UK-Exit`relay`[]UK`[]Exit


; ============================================================
; TOP-LEVEL SELECTOR
;
; select requires manual choice in the dashboard.
; All relay groups are listed as options, plus DIRECT as bypass.
; Routing rules point to this group via policy name "Proxy".
; ============================================================
custom_proxy_group=Proxy`select`[]HK-Exit`[]JP-Exit`[]KR-Exit`[]DE-Exit`[]UK-Exit`[]DIRECT


; ============================================================
; RULE GENERATION
;
; Disabled because all rules and rule-providers are defined
; directly in the base YAML (mybase.yaml).
; overwrite_original_rules=false preserves the base file rules.
; ============================================================
enable_rule_generator=false
overwrite_original_rules=false
